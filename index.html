<!DOCTYPE html> 
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Page d'accueil</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;

    display: flex;
    flex-direction: column;      /* empile verticalement */
    align-items: center;         /* centre horizontalement */
    padding-top: 40px;           /* espace en haut */
}

.container {
    width: 300px;
    background: white;
    padding: 20px;
    margin-bottom: 20px;         /* espace entre blocs */
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}
</style>



<body>

    <h2>Page d'accueil</h2>

    <input type="text" id="texte" placeholder="Correncon v07 - entre ton identifiant">
    <button onclick="envoyer()">Envoyer</button>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJIfBh2_g8s9PLKu4Es8u9qm23fYJU2oODOFr2nYOb4PIN_UskHl31amUNerdk3oSkjA/exec";
        //const SCRIPT_URL = "COLLE_ICI_TON_URL_GOOGLE_SCRIPT";

        function envoyer() {

            let texte = document.getElementById("texte").value;

            fetch(SCRIPT_URL + "?cde=" + encodeURIComponent(texte))
                .then(response => response.text())
                .then(data => {

                    // récupération complète de la réponse
                    console.log("Réponse complète :", data);

                    // si la réponse commence par OK → page2
                    if (data.startsWith("input:OK")) {
                        window.location.href = "page2.html";
                    }

                })
                .catch(error => {
                    console.error("Erreur :", error);
                });
        }

    </script>

</body>
</html>
