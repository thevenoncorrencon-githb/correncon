<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de Contrôle Élargie</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f0f2f5; }
        
        /* Fenêtres élargies (x2) : passage à 640px */
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); 
            width: 640px; 
            text-align: center; 
        }

        .hidden { display: none; }
        
        input, button { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
            font-size: 18px; 
        }

        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            transition: transform 0.1s, background 0.2s; 
        }

        button:active { transform: scale(0.98); }
        button:hover { opacity: 0.9; }

        /* Style spécifique pour les boutons de commande */
        .btn-cmd { margin-top: 10px; }

        /* Affichage placé en bas avec un style bien lisible */
        #affichage { 
            margin-top: 25px; 
            padding: 20px; 
            background: #2c3e50; 
            color: #ecf0f1; 
            border-radius: 8px; 
            min-height: 30px; 
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            border-left: 5px solid #007bff;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="page1" class="card">
        <h1 style="margin-top:0; color:#333;">Accès distant au chauffage Correncon</h1>
        <input type="text" id="idSaisi" placeholder="Entre ton identifiant ici">
        <button onclick="envoyer('login')">SE CONNECTER</button>
    </div>

    <div id="page2" class="card hidden">
        <h1 style="margin-top:0; color:#333;">Télécommande Chauffage Correncon</h1>
        
        <button class="btn-cmd" onclick="envoyer('marche')" style="background:#007bff">Mise en route du chauffage</button>
        <button class="btn-cmd" onclick="envoyer('arret')" style="background:#007bff">Arrêt du chauffage</button>
        <button class="btn-cmd" onclick="envoyer('etat')" style="background:#007bff">Mise à jour du monitoring</button>

        <div id="affichage">En attente d'action...</div>
    </div>

    <script>
        // REMPLACEZ PAR VOTRE URL DE DÉPLOIEMENT GOOGLE SCRIPT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFVmZQaJK1jDfC2NVunhe0mjpIQUCC3_Ltf9nUq5h_l3iOI1_wuM_zJeu92fqWQuYExQ/exec";

        async function envoyer(type) {
            const display = document.getElementById('affichage');
            let valeurAEnvoyer = "";

            if (type === 'login') {
                const id = document.getElementById('idSaisi').value;
                valeurAEnvoyer = "login:" + id;
            } else {
                valeurAEnvoyer = type;
                display.innerText = "> Envoi de la commande : " + type.toUpperCase() + "...";
            }

            try {
                const urlFinale = `${SCRIPT_URL}?cde=${encodeURIComponent(valeurAEnvoyer)}`;
                const response = await fetch(urlFinale);
                const texteBrut = await response.text();

                if (type === 'login') {
                    if (texteBrut.startsWith("logged")) {
                        document.getElementById('page1').classList.add('hidden');
                        document.getElementById('page2').classList.remove('hidden');
                        display.innerText = "swhtml002\n"+texteBrut; 
                    } else {
                        alert("Erreur : " + texteBrut);
                    }
                } else {
                    // Mise à jour de l'affichage en bas
                    display.innerText = "> " + texteBrut;
                }
            } catch (error) {
                console.error("Erreur:", error);
                display.innerText = "> ERREUR DE CONNEXION";
            }
        }
    </script>
</body>
</html>
