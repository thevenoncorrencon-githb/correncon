
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chauffage Corrençon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
            position: relative;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            padding-right: 20px;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            resize: vertical;
            font-family: Arial, sans-serif;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-group button {
            margin-top: 0;
        }
        .hidden {
            display: none !important;
        }
        /* Style discret pour l'écran de fin */
        .txt-fin {
            color: #666;
            font-size: 18px;
        }
        .link-relancer {
            color: #007bff;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="page-connexion" class="container">
        <span class="close-btn" onclick="fermerFenetre()">&times;</span>
        <h1>Chauffage Corrençon</h1>
        <input type="text" id="identifiant" placeholder="Entrez votre identifiant">
        <button id="btn-connexion" onclick="connexion()">Connexion</button>
    </div>

    <div id="page-accueil" class="container hidden">
        <span class="close-btn" onclick="fermerFenetre()">&times;</span>
        <h1>Bienvenue</h1>
        
        <div class="btn-group">
            <button onclick="envoyerCommande('marche')">Marche</button>
            <button onclick="envoyerCommande('arret')">Arrêt</button>
            <button onclick="envoyerCommande('etat')">État</button>
        </div>

        <textarea id="champ-statut" placeholder="Statut ou réponse..."></textarea>
    </div>

    <div id="page-fin" class="container hidden">
        <p class="txt-fin">L'application est fermée.</p>
        <a href="javascript:void(0);" class="link-relancer" onclick="relancerApp()">&circleur; Relancer l'application</a>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDjOHXzJo6uxGA_bOpq--GlXbi0jgXIBA68GO63dubATMus8Y5MrLUcQKUOO-d6J661A/exec";

        let identifiantValide = "";

        function fermerFenetre() {
            // Si la page d'accueil est masquée, ça veut dire qu'on a cliqué depuis la page de connexion
            if (document.getElementById('page-accueil').classList.contains('hidden')) {
                // On masque la connexion et on affiche l'écran de fin
                document.getElementById('page-connexion').classList.add('hidden');
                document.getElementById('page-fin').classList.remove('hidden');
            } else {
                // Si on était sur la page d'accueil, on nettoie tout et on retourne à la connexion
                identifiantValide = "";
                document.getElementById('identifiant').value = "";
                document.getElementById('champ-statut').value = "";
                document.getElementById('page-accueil').classList.add('hidden');
                document.getElementById('page-connexion').classList.remove('hidden');
            }
        }

        // Permet de réafficher la page de connexion depuis l'écran de fin
        function relancerApp() {
            document.getElementById('identifiant').value = "";
            document.getElementById('page-fin').classList.add('hidden');
            document.getElementById('page-connexion').classList.remove('hidden');
        }

        async function connexion() {
            const inputIdentifiant = document.getElementById('identifiant');
            const idValue = inputIdentifiant.value.trim();

            if (!idValue) {
                alert("Veuillez saisir un identifiant.");
                return;
            }

            try {
                const donneeCde = `connexion,${idValue}`;
                const url = `${GOOGLE_SCRIPT_URL}?cde=${encodeURIComponent(donneeCde)}`;

                const response = await fetch(url, { method: 'GET' });
                const texteRetour = await response.text(); 

                if (texteRetour.startsWith("identifiant inconnu")) {
                    inputIdentifiant.value = texteRetour;
                } else {
                    identifiantValide = idValue;
                    document.getElementById('page-connexion').classList.add('hidden');
                    document.getElementById('page-accueil').classList.remove('hidden');
                    
                    document.getElementById('champ-statut').value = texteRetour;
                }

            } catch (error) {
                console.error("Erreur lors de la connexion :", error);
                alert("Impossible de joindre le serveur.");
            }
        }

        async function envoyerCommande(nomBouton) {
            const champStatut = document.getElementById('champ-statut');
            let contenuChamp = champStatut.value;

            if (!contenuChamp.startsWith("cde")) {
                contenuChamp = "";

                const url = `${GOOGLE_SCRIPT_URL}?cde=${encodeURIComponent(donneeCde)}`;

                const response = await fetch(url, { method: 'GET' });
                const texteRetour = await response.text();
                
                champStatut.value = texteRetour;

            } catch (error) {
                console.error("Erreur lors de l'envoi de la commande :", error);
            }
        }
    </script>
</body>
</html>
